# E1.2 - NDVI Crop-Health Monitor
#
# Runs the Sentinel-2 NDVI cycle (ndvi_run_pipeline.py: ndvi/registry ->
# ndvi/baseline -> ndvi/current) on demand and on a ~10-day in-season schedule,
# writing alerts into the Mahsooli Google Sheet (NDVI_Log tab; the sector
# baseline curves live in the Sector_Baseline tab).
#
# HOW THE PM RUNS IT:
#   Actions tab -> "E1.2 - NDVI Crop-Health Monitor" -> Run workflow.
#   Leave the date blank for "today", or enter YYYY-MM-DD to re-check a past cycle.
#   It also runs automatically on the 1st/11th/21st at 06:00 UTC during the
#   cotton season (June-March; April/May runs would only report "Off-season").
#
# REQUIRED credentials. Settings -> Secrets and variables -> Actions:
#   Secret:    GEE_SERVICE_ACCOUNT_INFO  (the whole service-account key JSON)
#   Variables: EE_PROJECT_ID, NDVI_SHEET_ID
# Optional, to mirror each run (imagery + tables + run log) to Google Cloud Storage:
#   Variables: GCS_BUCKET (a bucket in EE_PROJECT_ID), NDVI_GCS_ARCHIVE=true
#   Secret:    GCS_SERVICE_ACCOUNT_INFO (optional - GCS reuses GEE_SERVICE_ACCOUNT_INFO
#              when this is empty, since the bucket lives in the same project)
# The same service account needs the Earth Engine roles
# (serviceusage.serviceUsageConsumer + Earth Engine Writer), Editor access to the
# Sheet (NDVI_SHEET_ID), AND roles/storage.objectAdmin on GCS_BUCKET. See
# docs/SETUP_CREDENTIALS.md.
#
# Plot registry: the baseline-donor plot registry (data/farmers/baseline_plots.csv,
# phones stripped) IS tracked, so CI can rebuild the sector baseline from scratch.
# The configured financed-farmer registry joins the cycle by default via
# NDVI_MONITOR_FARMERS=true. Set NDVI_FARMERS_CSV/NDVI_MONITOR_FARMERS as repository
# variables when production data lives outside the repo.
#
# No data is committed back: everything under data/ndvi/ is generated by the run
# (sector baseline, cycle log, imagery) and git-ignored. The baseline is rebuilt
# each run (a few hundred Earth Engine calls); the real deliverable is the Google
# Sheet + the optional Google Cloud Storage run archive, and the logs/imagery are
# kept as the GitHub run artifact below. Use --refresh locally to force a rebuild.

name: E1.2 - NDVI Crop-Health Monitor

on:
  # Manual button: the Product Manager clicks "Run workflow" (optionally a date).
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date YYYY-MM-DD (blank = today)"
        required: false
        default: ""
  # Automatic cadence: 1st/11th/21st at 06:00 UTC over the cotton season
  # (Jun-Dec + Jan-Mar; one season runs Jun 1 -> Mar 31 of the next year).
  schedule:
    - cron: "0 6 1,11,21 1-3,6-12 *"

permissions:
  contents: write

jobs:
  ndvi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install earthengine-api==1.4.3 google-api-python-client==2.149.0 google-auth==2.36.0 google-cloud-storage==2.19.0

      - name: Run NDVI pipeline
        env:
          EE_PROJECT_ID: ${{ vars.EE_PROJECT_ID }}
          GEE_SERVICE_ACCOUNT_INFO: ${{ secrets.GEE_SERVICE_ACCOUNT_INFO }}
          NDVI_SHEET_ID: ${{ vars.NDVI_SHEET_ID }}
          NDVI_SHEET_PUSH: "true"
          GCS_SERVICE_ACCOUNT_INFO: ${{ secrets.GCS_SERVICE_ACCOUNT_INFO }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          GCS_ARCHIVE: ${{ vars.GCS_ARCHIVE }}
          NDVI_GCS_ARCHIVE: ${{ vars.NDVI_GCS_ARCHIVE }}
          NDVI_FARMERS_CSV: ${{ vars.NDVI_FARMERS_CSV }}
          NDVI_MONITOR_FARMERS: ${{ vars.NDVI_MONITOR_FARMERS }}
          NDVI_REQUIRE_EXPORTS: ${{ vars.NDVI_REQUIRE_EXPORTS }}
        run: |
          if [ -n "${{ github.event.inputs.run_date }}" ]; then
            python ndvi/registry.py
            python ndvi/baseline.py
            python ndvi/current.py --date "${{ github.event.inputs.run_date }}" --push
          else
            python ndvi_run_pipeline.py
          fi

      - name: Upload NDVI logs + run folder (imagery, run_log.json)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ndvi-run
          path: |
            data/ndvi/ndvi_log_*.csv
            data/ndvi/runs/
          if-no-files-found: ignore
